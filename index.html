<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>銘勁汽車 · 林孟璇 儀表板中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f4f6f9;
    --bg2:      #ffffff;
    --bg3:      #eef1f6;
    --border:   #e2e6ed;
    --border-h: #c8cfda;
    --text:     #1a1f2e;
    --muted:    #6b7589;
    --dim:      #adb5c4;

    --blue:     #2563eb;
    --blue-lt:  #3b82f6;
    --blue-bg:  #eff6ff;
    --blue-bd:  #bfdbfe;

    --orange:   #d97706;
    --orange-lt:#f59e0b;
    --orange-bg:#fffbeb;
    --orange-bd:#fde68a;

    --red:      #dc2626;
    --red-lt:   #ef4444;
    --red-bg:   #fff1f1;
    --red-bd:   #fecaca;

    --green:    #16a34a;
    --green-lt: #22c55e;

    --radius:  14px;
    --shadow:  0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-h:0 4px 12px rgba(0,0,0,0.08), 0 8px 28px rgba(0,0,0,0.06);
    --font:    'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 極淡網格質感 */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(37,99,235,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37,99,235,0.025) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none; z-index: 0;
  }

  /* ── Header ── */
  .header {
    position: relative; z-index: 10;
    padding: 0 40px; height: 60px;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04);
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff; letter-spacing: -.3px;
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  }
  .brand-name { font-size: 14px; font-weight: 600; }
  .brand-sep  { color: var(--dim); font-size: 13px; margin: 0 2px; }
  .brand-sub  { font-size: 13px; color: var(--muted); }
  .hdr-pill {
    font-size: 11px; padding: 4px 11px; border-radius: 20px;
    background: var(--blue-bg); color: var(--blue);
    border: 1px solid var(--blue-bd); font-weight: 500;
  }

  /* ── Main ── */
  .main {
    position: relative; z-index: 1;
    max-width: 820px; margin: 0 auto;
    padding: 56px 32px 80px;
  }

  /* ── Hero ── */
  .hero { text-align: center; margin-bottom: 56px; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 500;
    color: var(--blue); letter-spacing: .14em; text-transform: uppercase;
    background: var(--blue-bg); border: 1px solid var(--blue-bd);
    padding: 4px 12px; border-radius: 20px; margin-bottom: 18px;
  }
  .hero-eyebrow::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--blue-lt); animation: blink 2s ease-in-out infinite;
  }
  .hero-title {
    font-size: 18px; font-weight: 300; line-height: 1.3; margin-bottom: 10px;
  }
  .hero-title strong { font-weight: 700; color: var(--blue); }
  .hero-sub { font-size: 13px; color: var(--muted); }

  /* ── Section label ── */
  .sec-label {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; font-weight: 600; color: var(--dim);
    letter-spacing: .1em; text-transform: uppercase; margin-bottom: 16px;
  }
  .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── Grid ── */
  .grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }

  /* ── Card ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 20px 20px;
    text-decoration: none; color: inherit;
    display: block; position: relative; overflow: hidden;
    box-shadow: var(--shadow);
    transition: border-color .2s, transform .18s, box-shadow .2s;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent, var(--blue)); opacity: 0; transition: opacity .2s;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .card:hover { border-color: var(--border-h); transform: translateY(-3px); box-shadow: var(--shadow-h); }
  .card:hover::before { opacity: 1; }
  .card:active { transform: translateY(0); box-shadow: var(--shadow); }

  /* ── Card head ── */
  .card-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
  .card-icon { width: 42px; height: 42px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

  /* ── Status badge ── */
  .status {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500;
    padding: 3px 9px; border-radius: 20px; border: 1px solid;
  }
  .status.online  { color: var(--green);  background: #f0fdf4; border-color: #bbf7d0; }
  .status.building{ color: var(--dim);    background: var(--bg3); border-color: var(--border); }

  .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: blink 2s ease-in-out infinite; }
  .status.building .dot { animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Card body ── */
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
  .card-desc  { font-size: 11.5px; color: var(--muted); line-height: 1.65; margin-bottom: 15px; min-height: 52px; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; border: 1px solid; font-weight: 500; white-space: nowrap; }

  .card-arrow {
    position: absolute; bottom: 18px; right: 18px;
    width: 15px; height: 15px; color: var(--dim);
    transition: color .2s, transform .2s; opacity: 0;
  }
  .card:hover .card-arrow { opacity: 1; color: var(--muted); transform: translate(2px,-2px); }

  /* ── Colour themes ── */
  .t-blue   { --accent: var(--blue); }
  .t-blue   .card-icon { background: var(--blue-bg); }
  .t-blue   .tag { color: var(--blue);   border-color: var(--blue-bd);   background: var(--blue-bg); }

  .t-orange { --accent: var(--orange-lt); }
  .t-orange .card-icon { background: var(--orange-bg); }
  .t-orange .tag { color: var(--orange); border-color: var(--orange-bd); background: var(--orange-bg); }

  .t-red    { --accent: var(--red-lt); }
  .t-red    .card-icon { background: var(--red-bg); }
  .t-red    .tag { color: var(--red);    border-color: var(--red-bd);    background: var(--red-bg); }

  /* ── Footer ── */
  .footer {
    position: relative; z-index: 1;
    text-align: center; padding: 24px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--dim);
  }

  /* ── 進場動畫 ── */
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
  .hero      { animation: fadeUp .5s ease both; }
  .sec-label { animation: fadeUp .5s ease .10s both; }
  .grid      { animation: fadeUp .5s ease .16s both; }

  /* ── RWD ── */
  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
    .main { padding: 36px 16px 56px; }
    .header { padding: 0 16px; }
    .brand-sep, .brand-sub { display: none; }
    .hero-title { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="brand">
    <div class="brand-logo">MG</div>
    <span class="brand-name">銘勁汽車</span>
    <span class="brand-sep">·</span>
    <span class="brand-sub">林孟璇 儀表板中心</span>
  </div>
  <span class="hdr-pill">財管部</span>
</header>

<!-- Main -->
<main class="main">

  <div class="hero">
    <div class="hero-eyebrow">Dashboard Hub</div>
    <h1 class="hero-title">選擇要查看的<strong>儀表板</strong></h1>
    <p class="hero-sub">點擊卡片即可進入對應的業績分析頁面</p>
  </div>

  <div class="sec-label">我的儀表板</div>
  <div class="grid">

    <!-- 1. 續保業績儀表板 -->
    <a href="dashboard.html" class="card t-blue">
      <div class="card-head">
        <div class="card-icon">🛡️</div>
        <div class="status online"><span class="dot"></span>即時</div>
      </div>
      <div class="card-title">續保業績儀表板</div>
      <div class="card-desc">MG 續保率、電訪漏斗分析、業代業績明細、獎金試算</div>
      <div class="card-tags">
        <span class="tag">續保追蹤</span>
        <span class="tag">電訪漏斗</span>
        <span class="tag">獎金試算</span>
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
    </a>

    <!-- 2. 保險績效儀表板 -->
    <a href="insurance_dashboard.html" class="card t-orange">
      <div class="card-head">
        <div class="card-icon">📋</div>
        <div class="status online"><span class="dot"></span>即時</div>
      </div>
      <div class="card-title">保險績效儀表板</div>
      <div class="card-desc">保費收入、核保績效、各險種業績分析</div>
      <div class="card-tags">
        <span class="tag">保費收入</span>
        <span class="tag">核保績效</span>
        <span class="tag">險種分析</span>
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
    </a>

    <!-- 3. 服務業績儀表板 ✅ 正式上線 -->
    <a href="service_dashboard.html" class="card t-red">
      <div class="card-head">
        <div class="card-icon">🔧</div>
        <div class="status online"><span class="dot"></span>即時</div>
      </div>
      <div class="card-title">服務業績儀表板</div>
      <div class="card-desc">工單分類、保修業績、服務廠效率分析</div>
      <div class="card-tags">
        <span class="tag">工單分類</span>
        <span class="tag">保修業績</span>
        <span class="tag">效率分析</span>
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
    </a>

  </div>

</main>

<!-- Footer -->
<footer class="footer">
  銘勁汽車股份有限公司 · 限授權人員存取
</footer>

</body>
</html>
